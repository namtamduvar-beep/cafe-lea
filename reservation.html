<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - Café Léa</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="reservation-body">
    <!-- Top Left Menu Button -->
    <a href="index.html" class="nav-button menu-btn">Retour</a>

    <div class="calendar-container">
        <div class="calendar-header">
            <button class="calendar-nav">&#10094;</button>
            <h2>Mai 2026</h2>
            <button class="calendar-nav">&#10095;</button>
        </div>
        
        <div class="calendar-grid" id="calendar-grid">
            <!-- Days will be generated by JS -->
        </div>

        <div class="time-slots" id="time-slots">
            <div class="time-slot">19:00</div>
            <div class="time-slot">19:30</div>
            <div class="time-slot">20:00</div>
            <div class="time-slot">20:30</div>
            <div class="time-slot">21:00</div>
            <div class="time-slot">21:30</div>
        </div>

        <button class="confirm-btn" id="confirm-btn">Confirmer la réservation</button>
    </div>

    <script src="app.js"></script>
</body>
</html>
