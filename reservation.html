<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réservation - Café Léa</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="reservation-layout">
        <!-- Calendar Side -->
        <div class="res-calendar-side">
            <a href="index.html" class="res-back">&larr; Retour au site</a>

            <div class="cal-header">
                <button class="cal-nav">&larr;</button>
                <span>Mai 2026</span>
                <button class="cal-nav">&rarr;</button>
            </div>

            <div class="cal-grid" id="calendar-grid">
                <!-- Javascript will populate days -->
            </div>
        </div>

        <!-- Form Side -->
        <div class="res-form-side">
            <h2>Réservez une table</h2>
            <div class="form-group">
                <label>Nombre de personnes</label>
                <select id="res-people">
                    <option>1 personne</option>
                    <option selected>2 personnes</option>
                    <option>3 personnes</option>
                    <option>4 personnes</option>
                    <option>5+ personnes</option>
                </select>
            </div>
            <div class="form-group">
                <label>Heure</label>
                <div class="time-grid" id="time-grid">
                    <div class="time-slot">19:00</div>
                    <div class="time-slot selected">19:30</div>
                    <div class="time-slot">20:00</div>
                    <div class="time-slot">20:30</div>
                    <div class="time-slot">21:00</div>
                    <div class="time-slot">21:30</div>
                </div>
            </div>
            <div class="form-group">
                <label>Vos coordonnées</label>
                <input type="text" placeholder="Nom complet" style="margin-bottom: 10px;">
                <input type="email" placeholder="Adresse email">
            </div>
            <button class="res-submit" id="res-submit">Réserver ma table</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
